name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      # 1. Clone the repository into the runner workspace
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      # 2. Dynamically drop your custom Bun Docker environment with Chromium and Xvfb
      - name: Create Dockerfile dynamically
        run: |
          cat << 'EOF' > Dockerfile
          FROM oven/bun:1

          # Install Chromium, Xvfb, and all necessary GUI layout/rendering libraries
          RUN apt-get update && apt-get install -y \
            chromium \
            chromium-driver \
            xvfb \
            xauth \
            libgbm1 \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libasound2 \
            && rm -rf /var/lib/apt/lists/*

          # Configure environment variables for Chromium and headless display
          ENV CHROME_PATH=/usr/bin/chromium
          ENV DISPLAY=:99

          WORKDIR /app

          # Copy project files
          COPY . .

          # Install dependencies
          RUN bun install

          EXPOSE 3000
          
          # Wrap the startup command with xvfb-run to automatically spin up the virtual screen
          CMD ["xvfb-run", "--server-args=-screen 0 1280x1024x24", "bun", "start"]
          EOF
          
      # 3. Setup advanced layers cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build image using GitHub Actions native cache
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: solver-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Spin up the container using the host's native network stack
      - name: Start Docker Container on Host Network
        run: |
          docker run -d \
            --network=host \
            -e PORT=3000 \
            -e HOST=127.0.0.1 \
            --name solver-container solver-app:latest
          
          echo "Giving the Bun API server 15 seconds to fully initialize..."
          sleep 15
          
          echo "=== Container Status Check ==="
          docker ps -a
          
          echo "=== Active Network Sockets ==="
          sudo ss -tulpn | grep -E '3000|7860' || echo "No active listener on expected ports"

      # 6. Execute the POST request targeting port 3000 directly
      - name: Orchestrate API Tasks & Update Upstash
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          attempt=1
          max_attempts=3
          success=false
          token=""

          while [ $attempt -le $max_attempts ]; do
            echo "========================================="
            echo "STARTING ATTEMPT $attempt OF $max_attempts"
            echo "========================================="
            
            # Since we are using --network=host, hit port 3000 directly on localhost
            INIT_RESP=$(curl -s -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode": "turnstile", "domain": "https://deltastudy.site/verify", "siteKey": "0x4AAAAAADnpjMgvQPlaYYog"}')
            
            echo "Response: $INIT_RESP"
            
            CODE=$(echo "$INIT_RESP" | jq -r '.code // empty')
            EXTRACTED_TOKEN=$(echo "$INIT_RESP" | jq -r '.token // empty')
            
            if [ "$CODE" = "200" ] && [ -n "$EXTRACTED_TOKEN" ] && [ "$EXTRACTED_TOKEN" != "null" ]; then
              token=$EXTRACTED_TOKEN
              echo "Task success! Extracted token value."
              success=true
              break
            else
              echo "Attempt $attempt failed or returned invalid data. Retrying in 5 seconds..."
              attempt=$((attempt+1))
              sleep 5
            fi
          done

          if [ "$success" != "true" ]; then
            echo "Error: Failed to obtain a token after $max_attempts global attempts."
            echo "=== Final Container Engine Logs ==="
            docker logs solver-container
            exit 1
          fi

          echo "========================================="
          echo "POSTING TOKEN AND EXTRACTING COOKIE"
          echo "========================================="
          
          COOKIE=$(curl -sI -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$token\"}" | grep -i '^set-cookie:' | head -n 1 | sed 's/^[^:]*:\s*//' | tr -d '\r\n')

          if [ -z "$COOKIE" ]; then
            echo "Error: Request succeeded but no 'set-cookie' header was returned."
            exit 1
          fi
          echo "Successfully captured target cookie payload."

          echo "========================================="
          echo "UPDATING UPSTASH REDIS CONSTANT ENDPOINT"
          echo "========================================="
          
          curl -s -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]"

          echo "Upstash Redis update complete!"

      # 7. Shutdown and clean up background containers unconditionally
      - name: Container Shutdown
        if: always()
        run: |
          echo "Tearing down application servers..."
          docker stop solver-container || true
          docker rm solver-container || true
