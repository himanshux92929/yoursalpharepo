name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Xvfb and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxcomposite1 libxdamage1 libxrandr2 libgbm1
          google-chrome-stable --version || sudo apt-get install -y google-chrome-stable

      - name: Start API Server
        run: |
          # Clean up any stray processes
          pkill -f "bun start" || true
          pkill -f Xvfb || true
          
          export CHROME_PATH="/usr/bin/google-chrome-stable"
          export PORT=3000
          export NODE_ENV=production
          
          # Start Xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          sleep 3
          
          # Start server
          bun start &
          
          # Wait for port binding with increasing patience
          echo "Waiting for port 3000..."
          for i in {1..30}; do
            if ss -lnt | grep -q ":3000"; then
              echo "✅ Port 3000 is listening!"
              # Give Chrome an extra moment to spin up
              sleep 15
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 3
          done
          
          if ! ss -lnt | grep -q ":3000"; then
            echo "❌ Port 3000 never opened"
            exit 1
          fi

      - name: Solve Turnstile & Update Upstash
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        timeout-minutes: 15
        run: |
          max_attempts=8
          delay=10
          token=""
          
          for attempt in $(seq 1 $max_attempts); do
            echo "========================================="
            echo "ATTEMPT $attempt/$max_attempts"
            echo "========================================="
            
            # Direct hit to /cloudflare with long timeout
            RESP=$(curl -s -m 180 -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode": "turnstile", "domain": "https://deltastudy.site/verify", "siteKey": "0x4AAAAAADnpjMgvQPlaYYog"}' 2>&1)
            
            # Parse if valid JSON
            if echo "$RESP" | jq -e . >/dev/null 2>&1; then
              CODE=$(echo "$RESP" | jq -r '.code // ""')
              EXTRACTED=$(echo "$RESP" | jq -r '.token // ""')
              MSG=$(echo "$RESP" | jq -r '.message // ""')
              
              echo "Code: $CODE"
              echo "Token: ${EXTRACTED:0:30}..."
              
              if [ "$CODE" = "200" ] && [ -n "$EXTRACTED" ] && [ "$EXTRACTED" != "null" ]; then
                token="$EXTRACTED"
                echo "✅ Token captured!"
                break
              else
                echo "❌ Failed: $MSG"
              fi
            else
              echo "❌ Invalid response: ${RESP:0:200}"
            fi
            
            # Exponential backoff
            echo "Retrying in ${delay}s..."
            sleep $delay
            delay=$((delay * 2))
            if [ $delay -gt 120 ]; then delay=120; fi
          done
          
          if [ -z "$token" ]; then
            echo "❌ Failed after $max_attempts attempts"
            exit 1
          fi
          
          echo "========================================="
          echo "EXTRACTING COOKIE"
          echo "========================================="
          
          COOKIE_RESP=$(curl -s -m 30 -i -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$token\"}")
          
          COOKIE=$(echo "$COOKIE_RESP" | grep -i '^set-cookie:' | head -1 | sed 's/^[^:]*:\s*//' | cut -d';' -f1 | tr -d '\r\n')
          
          if [ -z "$COOKIE" ]; then
            echo "❌ No cookie header found"
            echo "$COOKIE_RESP" | head -20
            exit 1
          fi
          
          echo "✅ Cookie: ${COOKIE:0:50}..."
          
          echo "========================================="
          echo "UPDATING UPSTASH"
          echo "========================================="
          
          curl -s -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]"
          
          echo "Done."
