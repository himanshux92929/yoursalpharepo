name: Run API Solver & Update Upstash

on:
  # Triggers the workflow via an external API call / cron-job
  repository_dispatch:
    types: [run-solver-task]

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build the Docker Image
        run: docker build -t solver-app .

      - name: Run the Docker Container
        # The --rm flag ensures the container cleans itself up after exiting
        run: docker run --rm solver-app

      - name: Update Upstash Redis (Constant Endpoint)
        # Only runs if the previous Docker step completes successfully
        if: success()
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          # Using the SET command overwrites the key rather than creating a new entry.
          # This keeps the data at a single, constant endpoint.
          curl -s -X POST \
            "${UPSTASH_REDIS_REST_URL}/set/solver_status/success" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}"
