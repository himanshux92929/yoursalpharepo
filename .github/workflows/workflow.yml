name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Chromium and Xvfb (matching Hugging Face setup)
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing \
            chromium-browser \
            chromium-chromedriver \
            xvfb \
            wget \
            gnupg \
            ca-certificates
          # Verify Chromium is available
          which chromium-browser || echo "chromium-browser not found at expected path"
          ls /usr/bin/chromium* 2>/dev/null || echo "No chromium binaries in /usr/bin"
          echo "Chromium installed: $(chromium-browser --version 2>/dev/null || echo 'version check failed')"

      - name: Start Server (Hugging Face style — clone, install already done, just start)
        run: |
          pkill -f "bun start" 2>/dev/null || true
          pkill -f Xvfb 2>/dev/null || true
          sleep 2

          # Start virtual display (same as Hugging Face setup)
          Xvfb :99 -screen 0 1024x768x24 &
          echo "Xvfb started on :99"

          # Set environment exactly like Dockerfile did
          export DISPLAY=:99
          export CHROME_PATH=$(which chromium-browser 2>/dev/null || echo "/usr/bin/chromium-browser")
          export PORT=3000
          export NODE_ENV=production
          export timeOut=180000

          # Persist for subsequent steps
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "CHROME_PATH=$CHROME_PATH" >> $GITHUB_ENV
          echo "PORT=3000" >> $GITHUB_ENV
          echo "timeOut=180000" >> $GITHUB_ENV

          # Start server with output captured
          bun start > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          echo "Server PID: $SERVER_PID"

          # Wait for port — any HTTP response means it's alive
          echo "Waiting for port 3000 to accept connections..."
          for i in $(seq 1 60); do
            if curl -s -o /dev/null --max-time 3 "http://127.0.0.1:3000" 2>/dev/null; then
              echo "Port 3000 accepting connections after $((i * 2))s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "ERROR: Server died during startup! Dumping log:"
              cat /tmp/server.log
              exit 1
            fi
            sleep 2
          done

          # Wait for "Browser initialized" in logs
          echo "Waiting for browser initialization..."
          for i in $(seq 1 40); do
            if grep -q "Browser initialized" /tmp/server.log 2>/dev/null; then
              echo "Browser initialized after $((i * 2))s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "ERROR: Server died during browser init! Dumping log:"
              cat /tmp/server.log
              exit 1
            fi
            sleep 2
          done

          echo "Server fully ready. No premature smoke test — first solve handles it."

      - name: Solve Turnstile
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DISPLAY: :99
          CHROME_PATH: ${{ env.CHROME_PATH }}
          PORT: 3000
          timeOut: 180000
          NODE_ENV: production
        run: |
          # Server resurrection function (if Turnstile crashes it)
          restart_server() {
            echo ">>> Restarting server..."
            pkill -f "bun start" 2>/dev/null || true
            sleep 2
            bun start > /tmp/server.log 2>&1 &
            NEW_PID=$!
            echo "New server PID: $NEW_PID"
            # Wait for port
            for j in $(seq 1 40); do
              if curl -s -o /dev/null --max-time 3 "http://127.0.0.1:3000" 2>/dev/null; then
                echo "Server port alive after $((j * 2))s"
                break
              fi
              sleep 2
            done
            # Wait for browser
            for j in $(seq 1 30); do
              if grep -q "Browser initialized" /tmp/server.log 2>/dev/null; then
                echo "Browser re-initialized after $((j * 2))s"
                break
              fi
              sleep 2
            done
          }

          TOKEN=""
          for i in 1 2 3 4 5; do
            echo ""
            echo "=========================================="
            echo "=== Turnstile Attempt $i of 5 ==="
            echo "=========================================="

            # Check if server is still alive before attempting
            if ! curl -s -o /dev/null --max-time 3 "http://127.0.0.1:3000" 2>/dev/null; then
              echo "Server unresponsive — restarting before attempt..."
              restart_server
            fi

            # Hit the endpoint with a generous timeout (240s curl, 180s internal)
            echo "Calling /cloudflare (curl timeout: 240s)..."
            RESP=$(curl -s -m 240 -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode":"turnstile","domain":"https://deltastudy.site/verify","siteKey":"0x4AAAAAADnpjMgvQPlaYYog"}' 2>&1 || echo "CURL_FAILED")

            echo "Response preview: ${RESP:0:400}"

            if [ "$RESP" = "CURL_FAILED" ]; then
              echo "Curl returned nothing (timeout or connection refused)"
              echo "Server log tail:"
              tail -20 /tmp/server.log
              restart_server
              continue
            fi

            # Extract token safely
            TOKEN=$(echo "$RESP" | jq -r '.token // empty' 2>/dev/null || echo "")

            if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
              echo ""
              echo "✓ TOKEN OBTAINED: ${TOKEN:0:60}..."
              echo "TOKEN=$TOKEN" >> $GITHUB_ENV
              break
            fi

            # No token — check if server errored internally
            echo "No token in response. Checking for server errors..."
            if echo "$RESP" | grep -qE "Timeout Error|error|500|crash"; then
              echo "Server-side error detected — restarting before next attempt"
              tail -20 /tmp/server.log
              restart_server
            else
              echo "Unexpected response format — will retry without restart"
            fi

            sleep 5
          done

          # Final verdict
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo ""
            echo "=========================================="
            echo "ERROR: All 5 attempts failed to get token"
            echo "=========================================="
            echo "Complete server log:"
            cat /tmp/server.log
            exit 1
          fi

          echo "Token captured and stored in GITHUB_ENV"

      - name: Extract Cookie
        if: env.TOKEN != ''
        run: |
          echo "Exchanging Turnstile token for session cookie..."
          COOKIE_RESP=$(curl -s -i -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$TOKEN\"}" 2>&1 || echo "COOKIE_REQUEST_FAILED")

          if [ "$COOKIE_RESP" = "COOKIE_REQUEST_FAILED" ]; then
            echo "ERROR: Cookie exchange request failed entirely"
            exit 1
          fi

          echo "Response headers from cookie exchange:"
          echo "$COOKIE_RESP" | head -25

          COOKIE=$(echo "$COOKIE_RESP" | grep -i '^set-cookie:' | head -1 | cut -d';' -f1 | sed 's/^[^:]*:\s*//')

          if [ -z "$COOKIE" ]; then
            echo "ERROR: No Set-Cookie header found in response"
            echo "Full response:"
            echo "$COOKIE_RESP"
            exit 1
          fi

          echo "Cookie extracted: ${COOKIE:0:80}..."
          echo "COOKIE=$COOKIE" >> $GITHUB_ENV

      - name: Update Upstash
        if: env.COOKIE != ''
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          echo "Storing cookie in Upstash Redis..."
          UPSTASH_RESP=$(curl -s -w "\n%{http_code}" -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]" 2>&1)

          HTTP_CODE=$(echo "$UPSTASH_RESP" | tail -1)
          BODY=$(echo "$UPSTASH_RESP" | sed '$d')

          echo "Upstash HTTP status: $HTTP_CODE"
          echo "Upstash response body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Upstash update returned non-200 status ($HTTP_CODE)"
            exit 1
          fi

          echo "✓ Cookie successfully stored in Upstash as 'solver_cookie'"
