name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      # 1. Clone the repository into the runner workspace
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      # 2. Setup Bun natively on the host machine
      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 3. Install dependencies directly on the host
      - name: Install Project Dependencies
        run: bun install

      # 4. Start the server letting the app natively spawn its own Xvfb session
      - name: Start API Server on Host
        run: |
          # Use the pre-installed Chrome binary path on GitHub Actions runners
          export CHROME_PATH="/usr/bin/google-chrome"
          export PORT=3000
          export NODE_ENV=production
          
          # Run directly WITHOUT xvfb-run. The codebase sets 'disableXvfb: false', 
          # meaning it automatically launches its own internal Xvfb setup.
          bun start &
          
          echo "Giving the Bun API server 20 seconds to spin up and hook the browser..."
          sleep 20

      # 5. Execute the POST request, retry logic, cookie-extraction, and Upstash pipeline
      - name: Orchestrate API Tasks & Update Upstash
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          attempt=1
          max_attempts=3
          success=false
          token=""

          while [ $attempt -le $max_attempts ]; do
            echo "========================================="
            echo "STARTING ATTEMPT $attempt OF $max_attempts"
            echo "========================================="
            
            # Send POST request directly to port 3000 on localhost
            INIT_RESP=$(curl -s -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode": "turnstile", "domain": "https://deltastudy.site/verify", "siteKey": "0x4AAAAAADnpjMgvQPlaYYog"}' || echo "CURL_FAILED")
            
            echo "Response: $INIT_RESP"
            
            if [ "$INIT_RESP" = "CURL_FAILED" ]; then
              echo "Network connection to API server failed."
              CODE="500"
            else
              # Parse the code and token safely from the response
              CODE=$(echo "$INIT_RESP" | jq -r '.code // empty')
              EXTRACTED_TOKEN=$(echo "$INIT_RESP" | jq -r '.token // empty')
            fi
            
            # Verify token payload match conditions cleanly
            if [ -n "$EXTRACTED_TOKEN" ] && [ "$EXTRACTED_TOKEN" != "null" ] && [ "$CODE" != "500" ]; then
              token=$EXTRACTED_TOKEN
              echo "Task success! Extracted token value."
              success=true
              break 
            else
              echo "Attempt $attempt failed or returned an empty response. Retrying in 5 seconds..."
              attempt=$((attempt+1))
              sleep 5
            fi
          done

          # Critical check: Did we secure a token?
          if [ "$success" != "true" ]; then
            echo "Error: Failed to obtain a token after $max_attempts global attempts."
            exit 1
          fi

          echo "========================================="
          echo "POSTING TOKEN AND EXTRACTING COOKIE"
          echo "========================================="
          
          # Send token to the target and isolate the 'set-cookie' header
          COOKIE=$(curl -sI -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$token\"}" | grep -i '^set-cookie:' | head -n 1 | sed 's/^[^:]*:\s*//' | tr -d '\r\n')

          if [ -z "$COOKIE" ]; then
            echo "Error: Request succeeded but no 'set-cookie' header was returned."
            exit 1
          fi
          echo "Successfully captured target cookie payload."

          echo "========================================="
          echo "UPDATING UPSTASH REDIS CONSTANT ENDPOINT"
          echo "========================================="
          
          # Overwrite the key using Upstash JSON Array syntax.
          curl -s -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]"

          echo "Upstash Redis update complete!"
