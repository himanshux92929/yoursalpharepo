name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Google Chrome Stable (bypass Snap entirely)
        run: |
          # Remove any snap-based chromium packages that might be partially installed
          sudo apt-get remove -y chromium-browser chromium-chromedriver 2>/dev/null || true
          
          # Install Google Chrome Stable from Google's own repo (clean .deb, no snap)
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] https://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y --fix-missing google-chrome-stable xvfb
          
          # Verify the binary exists and show version
          CHROME_PATH=$(which google-chrome-stable 2>/dev/null || echo "/usr/bin/google-chrome-stable")
          echo "Chrome path: $CHROME_PATH"
          $CHROME_PATH --version || echo "WARNING: Chrome binary not functional"
          echo "CHROME_PATH=$CHROME_PATH" >> $GITHUB_ENV

      - name: Start Server & Wait for Readiness
        run: |
          pkill -f "bun start" 2>/dev/null || true
          pkill -f Xvfb 2>/dev/null || true
          sleep 2

          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          echo "DISPLAY=:99" >> $GITHUB_ENV

          export PORT=3000
          export NODE_ENV=production
          export timeOut=180000
          echo "PORT=3000" >> $GITHUB_ENV
          echo "timeOut=180000" >> $GITHUB_ENV
          echo "NODE_ENV=production" >> $GITHUB_ENV

          bun start > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          echo "Server PID: $SERVER_PID"

          echo "Waiting for port 3000..."
          MAX_WAIT=120
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if curl -s -o /dev/null --max-time 3 "http://127.0.0.1:3000" 2>/dev/null; then
              echo "Port 3000 accepting connections after ${ELAPSED}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "ERROR: Server process died! Last 20 lines:"
              tail -20 /tmp/server.log
              exit 1
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
            echo "Still waiting... (${ELAPSED}s elapsed)"
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "ERROR: Server never became ready after ${MAX_WAIT}s"
            tail -20 /tmp/server.log
            exit 1
          fi

          echo "Waiting for browser initialization..."
          MAX_BROWSER_WAIT=60
          BROWSER_ELAPSED=0
          while [ $BROWSER_ELAPSED -lt $MAX_BROWSER_WAIT ]; do
            if grep -q "Browser initialized" /tmp/server.log 2>/dev/null; then
              echo "Browser initialized after ${BROWSER_ELAPSED}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "ERROR: Server died during browser init! Last 20 lines:"
              tail -20 /tmp/server.log
              exit 1
            fi
            sleep 2
            BROWSER_ELAPSED=$((BROWSER_ELAPSED + 2))
          done

          if [ $BROWSER_ELAPSED -ge $MAX_BROWSER_WAIT ]; then
            echo "WARNING: 'Browser initialized' not seen after ${MAX_BROWSER_WAIT}s — proceeding anyway"
          fi

          echo "Server fully ready. Browser is initialized, proceeding to solve."

      - name: Solve Turnstile
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DISPLAY: :99
          CHROME_PATH: ${{ env.CHROME_PATH }}
          PORT: 3000
          timeOut: 180000
          NODE_ENV: production
        run: |
          restart_server() {
            echo ">>> Restarting server..."
            pkill -f "bun start" 2>/dev/null || true
            sleep 2
            bun start > /tmp/server.log 2>&1 &
            NEW_PID=$!
            echo "New server PID: $NEW_PID"
            for j in $(seq 1 40); do
              if curl -s -o /dev/null --max-time 3 "http://127.0.0.1:3000" 2>/dev/null; then
                echo "Server port alive after $((j * 2))s"
                break
              fi
              sleep 2
            done
            for j in $(seq 1 30); do
              if grep -q "Browser initialized" /tmp/server.log 2>/dev/null; then
                echo "Browser re-initialized after $((j * 2))s"
                break
              fi
              sleep 2
            done
          }

          TOKEN=""
          for i in 1 2 3 4 5; do
            echo ""
            echo "=========================================="
            echo "=== Turnstile Attempt $i of 5 ==="
            echo "=========================================="

            if ! curl -s -o /dev/null --max-time 3 "http://127.0.0.1:3000" 2>/dev/null; then
              echo "Server unresponsive — restarting before attempt..."
              restart_server
            fi

            echo "Calling /cloudflare (curl timeout: 240s)..."
            RESP=$(curl -s -m 240 -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode":"turnstile","domain":"https://deltastudy.site/verify","siteKey":"0x4AAAAAADnpjMgvQPlaYYog"}' 2>&1 || echo "CURL_FAILED")

            echo "Response preview: ${RESP:0:400}"

            if [ "$RESP" = "CURL_FAILED" ]; then
              echo "Curl returned nothing (timeout or connection refused)"
              echo "Server log tail:"
              tail -20 /tmp/server.log
              restart_server
              continue
            fi

            TOKEN=$(echo "$RESP" | jq -r '.token // empty' 2>/dev/null || echo "")

            if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
              echo ""
              echo "✓ TOKEN OBTAINED: ${TOKEN:0:60}..."
              echo "TOKEN=$TOKEN" >> $GITHUB_ENV
              break
            fi

            echo "No token in response. Checking for server errors..."
            if echo "$RESP" | grep -qE "Timeout Error|error|500|crash"; then
              echo "Server-side error detected — restarting before next attempt"
              tail -20 /tmp/server.log
              restart_server
            else
              echo "Unexpected response — will retry without restart"
            fi

            sleep 5
          done

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo ""
            echo "=========================================="
            echo "ERROR: All 5 attempts failed to get token"
            echo "=========================================="
            echo "Complete server log:"
            cat /tmp/server.log
            exit 1
          fi

          echo "Token captured and stored in GITHUB_ENV"

      - name: Extract Cookie
        if: env.TOKEN != ''
        run: |
          echo "Exchanging Turnstile token for session cookie..."
          COOKIE_RESP=$(curl -s -i -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$TOKEN\"}" 2>&1 || echo "COOKIE_REQUEST_FAILED")

          if [ "$COOKIE_RESP" = "COOKIE_REQUEST_FAILED" ]; then
            echo "ERROR: Cookie exchange request failed entirely"
            exit 1
          fi

          echo "Response headers from cookie exchange:"
          echo "$COOKIE_RESP" | head -25

          COOKIE=$(echo "$COOKIE_RESP" | grep -i '^set-cookie:' | head -1 | cut -d';' -f1 | sed 's/^[^:]*:\s*//')

          if [ -z "$COOKIE" ]; then
            echo "ERROR: No Set-Cookie header found in response"
            echo "Full response:"
            echo "$COOKIE_RESP"
            exit 1
          fi

          echo "Cookie extracted: ${COOKIE:0:80}..."
          echo "COOKIE=$COOKIE" >> $GITHUB_ENV

      - name: Update Upstash
        if: env.COOKIE != ''
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          echo "Storing cookie in Upstash Redis..."
          UPSTASH_RESP=$(curl -s -w "\n%{http_code}" -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]" 2>&1)

          HTTP_CODE=$(echo "$UPSTASH_RESP" | tail -1)
          BODY=$(echo "$UPSTASH_RESP" | sed '$d')

          echo "Upstash HTTP status: $HTTP_CODE"
          echo "Upstash response body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Upstash update returned non-200 status ($HTTP_CODE)"
            exit 1
          fi

          echo "✓ Cookie successfully stored in Upstash as 'solver_cookie'"
