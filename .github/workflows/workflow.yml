name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Xvfb and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          google-chrome-stable --version || sudo apt-get install -y google-chrome-stable

      - name: Start Server
        run: |
          pkill -f "bun start" || true
          pkill -f Xvfb || true
          export CHROME_PATH="/usr/bin/google-chrome-stable"
          export PORT=3000
          export NODE_ENV=production
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          sleep 3
          bun start &
          sleep 30
          echo "Server started"

      - name: Solve Turnstile
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i"
            RESP=$(curl -s -m 180 -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode":"turnstile","domain":"https://deltastudy.site/verify","siteKey":"0x4AAAAAADnpjMgvQPlaYYog"}')
            echo "$RESP"
            TOKEN=$(echo "$RESP" | jq -r '.token // ""')
            if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
              echo "TOKEN=$TOKEN" >> $GITHUB_ENV
              break
            fi
            sleep 20
          done

      - name: Extract Cookie
        if: env.TOKEN != ''
        run: |
          COOKIE_RESP=$(curl -s -i -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$TOKEN\"}")
          COOKIE=$(echo "$COOKIE_RESP" | grep -i '^set-cookie:' | head -1 | cut -d';' -f1 | sed 's/^[^:]*:\s*//')
          echo "COOKIE=$COOKIE" >> $GITHUB_ENV

      - name: Update Upstash
        if: env.COOKIE != ''
        run: |
          curl -s -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]"
