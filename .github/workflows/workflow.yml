name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Xvfb and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          if ! google-chrome-stable --version 2>/dev/null; then
            sudo apt-get install -y google-chrome-stable
          fi
          echo "Chrome installed: $(google-chrome-stable --version 2>/dev/null || echo 'fallback')"

      - name: Start Server & Wait for Readiness
        run: |
          pkill -f "bun start" 2>/dev/null || true
          pkill -f Xvfb 2>/dev/null || true
          sleep 2

          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          echo "DISPLAY=:99" >> $GITHUB_ENV

          export CHROME_PATH="/usr/bin/google-chrome-stable"
          export PORT=3000
          export NODE_ENV=production
          bun start &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          echo "Waiting for server on port 3000..."
          MAX_WAIT=120
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Just check if the port is accepting TCP connections—any HTTP response (even 404) counts
            if curl -s -o /dev/null --max-time 5 "http://127.0.0.1:3000" 2>/dev/null; then
              echo "Port 3000 accepting connections after ${ELAPSED}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "ERROR: Server process died!"
              exit 1
            fi
            sleep 3
            ELAPSED=$((ELAPSED + 3))
            echo "Still waiting... (${ELAPSED}s elapsed)"
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "ERROR: Server never became ready after ${MAX_WAIT}s"
            exit 1
          fi

          # Wait for browser initialization to finish inside the server
          echo "Waiting for browser backend..."
          sleep 10

          # Smoke test the actual endpoint
          echo "Smoke-testing /cloudflare endpoint..."
          SMOKE_RESP=$(curl -s -m 30 -X POST "http://127.0.0.1:3000/cloudflare" \
            -H "Content-Type: application/json" \
            -d '{"mode":"turnstile","domain":"https://deltastudy.site/verify","siteKey":"0x4AAAAAADnpjMgvQPlaYYog"}' 2>&1 || echo "SMOKE_FAILED")
          echo "Smoke test response: ${SMOKE_RESP:0:300}"
          if [ "$SMOKE_RESP" = "SMOKE_FAILED" ]; then
            echo "ERROR: /cloudflare endpoint not responding"
            exit 1
          fi
          echo "Server fully ready."

      - name: Solve Turnstile
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          TOKEN=""
          for i in 1 2 3 4 5; do
            echo "=== Turnstile Attempt $i ==="
            RESP=$(curl -s -m 180 -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode":"turnstile","domain":"https://deltastudy.site/verify","siteKey":"0x4AAAAAADnpjMgvQPlaYYog"}' 2>&1 || echo "CURL_FAILED")
            
            echo "Raw response: ${RESP:0:500}"
            
            if [ "$RESP" = "CURL_FAILED" ]; then
              echo "Curl failed — server may be down, retrying..."
              sleep 20
              continue
            fi

            TOKEN=$(echo "$RESP" | jq -r '.token // empty' 2>/dev/null || echo "")
            
            if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
              echo "Got token: ${TOKEN:0:50}..."
              echo "TOKEN=$TOKEN" >> $GITHUB_ENV
              break
            fi
            
            echo "No valid token in response, retrying after 20s..."
            sleep 20
          done

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "ERROR: Failed to obtain token after 5 attempts"
            exit 1
          fi

      - name: Extract Cookie
        if: env.TOKEN != ''
        run: |
          echo "Exchanging token for cookie..."
          COOKIE_RESP=$(curl -s -i -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$TOKEN\"}" 2>&1 || echo "COOKIE_REQUEST_FAILED")
          
          if [ "$COOKIE_RESP" = "COOKIE_REQUEST_FAILED" ]; then
            echo "ERROR: Cookie exchange request failed"
            exit 1
          fi

          echo "Cookie response headers:"
          echo "$COOKIE_RESP" | head -20

          COOKIE=$(echo "$COOKIE_RESP" | grep -i '^set-cookie:' | head -1 | cut -d';' -f1 | sed 's/^[^:]*:\s*//')
          
          if [ -z "$COOKIE" ]; then
            echo "ERROR: No Set-Cookie header found in response"
            exit 1
          fi
          
          echo "Cookie extracted: ${COOKIE:0:80}..."
          echo "COOKIE=$COOKIE" >> $GITHUB_ENV

      - name: Update Upstash
        if: env.COOKIE != ''
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          echo "Pushing cookie to Upstash..."
          UPSTASH_RESP=$(curl -s -w "\n%{http_code}" -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]" 2>&1)
          
          HTTP_CODE=$(echo "$UPSTASH_RESP" | tail -1)
          BODY=$(echo "$UPSTASH_RESP" | sed '$d')
          
          echo "Upstash HTTP status: $HTTP_CODE"
          echo "Upstash response: $BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Upstash update returned non-200 status"
            exit 1
          fi
          
          echo "Cookie successfully stored in Upstash."
