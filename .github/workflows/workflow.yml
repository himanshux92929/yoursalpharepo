- name: Patch turnstile.ts
  run: |
    cat > src/lib/ends/turnstile.ts << 'TSEOF'
    interface TurnstileData {
        domain: string;
        siteKey: string;
        proxy?: {
            username?: string;
            password?: string;
        };
    }

    async function turnstile({ domain, proxy, siteKey }: TurnstileData, page: any) {
        if (!domain) throw new Error("Missing domain parameter");
        if (!siteKey) throw new Error("Missing siteKey parameter");

        const timeout = (global as any).timeOut || 60000;

        const htmlContent = `<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>
    <div class="cf-turnstile" data-sitekey="${siteKey}"></div>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    </body></html>`;

        try {
            if (proxy?.username && proxy?.password) {
                await page.authenticate({
                    username: proxy.username,
                    password: proxy.password,
                });
            }

            await page.setCacheEnabled(false);
            page.removeAllListeners("request");
            await page.setRequestInterception(true);

            page.on("request", async (request: any) => {
                const reqUrl = request.url();

                if ([domain, domain + "/"].includes(reqUrl) && request.resourceType() === "document") {
                    return request.respond({
                        status: 200,
                        contentType: "text/html",
                        body: htmlContent,
                    });
                }

                if (reqUrl.includes("challenges.cloudflare.com/reports/")) {
                    return request.abort();
                }

                return request.continue();
            });

            await page.goto(domain, { waitUntil: "domcontentloaded", timeout: 15000 });

            await page.waitForFunction(
                () => {
                    const el = document.querySelector('[name="cf-turnstile-response"]') as HTMLInputElement | null;
                    return el !== null && el.value !== null && el.value.length > 10;
                },
                { timeout }
            );

            const token = await page.evaluate(() => {
                const el = document.querySelector('[name="cf-turnstile-response"]') as HTMLInputElement | null;
                return el ? el.value : null;
            });

            if (!token || token.length < 10) throw new Error("Failed to get token");
            return token;

        } catch (e) {
            throw e;
        }
    }

    export = turnstile;
    TSEOF
    echo "Patched. First 5 lines:"
    head -5 src/lib/ends/turnstile.ts
    echo "Line count:"
    wc -l src/lib/ends/turnstile.ts
