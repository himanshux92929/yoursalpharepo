name: Clone, Build & Notify via Upstash Redis

on:
  repository_dispatch:
    types: [health-check]
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub repository URL to clone'
        required: true
        type: string
      repo_ref:
        description: 'Branch/tag/commit to checkout (optional)'
        required: false
        type: string
        default: 'main'

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve inputs (dispatch vs workflow_dispatch)
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "repo_url=${{ github.event.client_payload.repo_url }}" >> "$GITHUB_OUTPUT"
            echo "repo_ref=${{ github.event.client_payload.repo_ref || 'main' }}" >> "$GITHUB_OUTPUT"
          else
            echo "repo_url=${{ inputs.repo_url }}" >> "$GITHUB_OUTPUT"
            echo "repo_ref=${{ inputs.repo_ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone target repository
        run: |
          git clone --branch "${{ steps.vars.outputs.repo_ref }}" "${{ steps.vars.outputs.repo_url }}" cloned-repo || \
          git clone "${{ steps.vars.outputs.repo_url }}" cloned-repo

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: cloned-repo
        run: bun install

      - name: Start the server
        working-directory: cloned-repo
        run: bun start

      - name: Notify success to Upstash Redis
        if: success()
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          curl -X POST "$UPSTASH_REDIS_REST_URL/set/job_status/success" \
            -H "Authorization: Bearer $UPSTASH_REDIS_REST_TOKEN"

      - name: Notify failure to Upstash Redis
        if: failure()
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          curl -X POST "$UPSTASH_REDIS_REST_URL/set/job_status/failed" \
            -H "Authorization: Bearer $UPSTASH_REDIS_REST_TOKEN"
