name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Xvfb and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libatk-bridge2.0-0
          
          # Install Chrome stable
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          # Verify Chrome is executable
          google-chrome-stable --version

      - name: Start API Server with Xvfb and Debug
        run: |
          # Kill any leftover processes
          pkill -f "bun start" || true
          pkill -f Xvfb || true
          
          export CHROME_PATH="/usr/bin/google-chrome-stable"
          export PORT=3000
          export NODE_ENV=production
          export DEBUG=*
          
          # Start Xvfb with proper display
          Xvfb :99 -screen 0 1024x768x24 -ac &
          export DISPLAY=:99
          
          # Wait for Xvfb
          sleep 3
          
          # Start the server with verbose output
          bun start --disableXvfb=false --verbose 2>&1 | tee server.log &
          SERVER_PID=$!
          
          # Health check with longer timeout and more attempts
          echo "Waiting for server on port 3000..."
          for i in {1..40}; do
            if ss -lnt | grep -q ":3000"; then
              echo "✅ Port 3000 is listening!"
              break
            fi
            echo "Attempt $i/40 - waiting for port..."
            sleep 3
          done
          
          # Additional health check
          if ! ss -lnt | grep -q ":3000"; then
            echo "❌ Server failed to bind to port 3000"
            echo "Server logs:"
            cat server.log || echo "No logs found"
            exit 1
          fi
          
          echo "Server started with PID: $SERVER_PID"

      - name: Orchestrate API Tasks & Update Upstash
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        timeout-minutes: 10
        run: |
          attempt=1
          max_attempts=5
          success=false
          token=""

          while [ $attempt -le $max_attempts ]; do
            echo "========================================="
            echo "STARTING ATTEMPT $attempt OF $max_attempts"
            echo "========================================="
            
            # Check if server is actually responding to any request first
            if ! curl -s -m 10 -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/health | grep -q "200"; then
              echo "❌ Server not responding to health check"
              echo "Checking server logs..."
              ps aux | grep bun
              cat server.log || echo "No logs available"
              attempt=$((attempt+1))
              sleep 10
              continue
            fi
            
            # Send the solve request with much longer timeout
            echo "Sending solve request to /cloudflare..."
            INIT_RESP=$(curl -s -m 120 -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode": "turnstile", "domain": "https://deltastudy.site/verify", "siteKey": "0x4AAAAAADnpjMgvQPlaYYog"}' 2>&1)
            
            CURL_EXIT=$?
            
            if [ $CURL_EXIT -ne 0 ] || [ -z "$INIT_RESP" ]; then
              echo "❌ CURL failed with exit code $CURL_EXIT"
              echo "Response: $INIT_RESP"
              attempt=$((attempt+1))
              sleep 15
              continue
            fi
            
            echo "Raw response (first 500 chars):"
            echo "$INIT_RESP" | head -c 500
            echo ""
            
            # Parse JSON
            if echo "$INIT_RESP" | jq -e . >/dev/null 2>&1; then
              CODE=$(echo "$INIT_RESP" | jq -r '.code // "500"')
              EXTRACTED_TOKEN=$(echo "$INIT_RESP" | jq -r '.token // ""')
              MESSAGE=$(echo "$INIT_RESP" | jq -r '.message // ""')
            else
              echo "❌ Invalid JSON response"
              attempt=$((attempt+1))
              sleep 10
              continue
            fi
            
            echo "Parsed code: $CODE"
            echo "Parsed token: ${EXTRACTED_TOKEN:0:30}..."
            
            # Validate
            if [ -n "$EXTRACTED_TOKEN" ] && [ "$EXTRACTED_TOKEN" != "null" ] && [ "$CODE" = "200" ]; then
              token="$EXTRACTED_TOKEN"
              echo "✅ Token obtained successfully!"
              success=true
              break
            else
              echo "❌ Attempt $attempt failed. Code: $CODE, Message: $MESSAGE"
              
              # Check for specific Chrome errors
              if echo "$MESSAGE" | grep -qi "chrome"; then
                echo "🔄 Chrome-related error detected - restarting server..."
                pkill -f "bun start" || true
                sleep 5
                bun start --disableXvfb=false --verbose > server.log 2>&1 &
                sleep 20
              fi
              
              attempt=$((attempt+1))
              if [ $attempt -le $max_attempts ]; then
                echo "Retrying in 15 seconds..."
                sleep 15
              fi
            fi
          done

          if [ "$success" != "true" ]; then
            echo "❌ Error: Failed to obtain a token after $max_attempts attempts."
            echo "Final server log:"
            cat server.log || echo "No logs"
            exit 1
          fi

          echo "========================================="
          echo "POSTING TOKEN AND EXTRACTING COOKIE"
          echo "========================================="
          
          COOKIE_RESP=$(curl -s -m 30 -i -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$token\"}" 2>&1)
          
          COOKIE=$(echo "$COOKIE_RESP" | grep -i '^set-cookie:' | head -n 1 | sed 's/^[^:]*:\s*//' | tr -d '\r\n' | cut -d';' -f1)
          
          if [ -z "$COOKIE" ]; then
            echo "❌ Error: No set-cookie header."
            echo "Response headers:"
            echo "$COOKIE_RESP" | head -30
            exit 1
          fi
          
          echo "✅ Cookie captured: ${COOKIE:0:50}..."

          echo "========================================="
          echo "UPDATING UPSTASH REDIS"
          echo "========================================="
          
          UPSTASH_RESP=$(curl -s -m 30 -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]")
          
          if echo "$UPSTASH_RESP" | jq -e '.result == "OK"' >/dev/null 2>&1; then
            echo "✅ Upstash update successful!"
          else
            echo "⚠️ Upstash update: $UPSTASH_RESP"
          fi
